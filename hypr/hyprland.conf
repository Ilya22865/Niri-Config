monitor=eDP-1,1920x1080@144,0x0,1
#monitor=HDMI-A-1, 1920x1080@144,1920x0,1
#monitor=HDMI-A-1, 1920x1080@120,1920x0,1
monitor=HDMI-A-1, 1920x1080@75,1920x0,1

## VARIABLES

$terminal = foot
$fileManager = nautilus
$menu = wofi
$powerMenu = wlogout

## Autostart
exec-once = eval $(gnome-keyring-daemon --start --components=pkcs11,secrets,ssh,gpg); export SSH_AUTH_SOCK

exec-once = nm-applet &
exec-once = waybar &
exec-once = swww-daemon &
exec-once = sleep .5 && swww restore 
exec-once = copyq &
exec-once = swaync &
exec-once = pypr &
exec-once = swaync-client -df
exec-once = hypridle &

## Environment Variables

env = XCURSOR_SIZE,20
env = HYPRCURSOR_SIZE,20
env = LIBVA_DRIVER_NAME,nvidia
env = XDG_SESSION_TYPE,wayland
env = XDG_CURRENT_DESKTOP,Hyprland
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME, nvidia
env = XDG_SESSION_DESKTOP,Hyprland
env = ELECTRON_OZONE_PLATFORM_HINT,auto

xwayland {
  force_zero_scaling = true
}


## Customization

misc {
  disable_hyprland_logo = true
  force_default_wallpaper = 0
}

cursor {
    no_hardware_cursors = true
}

general {
    gaps_in = 5
    gaps_out = 10

    border_size = 0
    
    col.inactive_border = rgba(595959aa)
    col.active_border = rgb(C6C2C2)

    resize_on_border = false
    allow_tearing = false
    layout = dwindle
}

decoration {
    shadow {
      enabled = false
      range = 4
      render_power = 3
      color = rgba(1a1a1aee)
    }
    rounding = 10
    inactive_opacity = 0.65
    active_opacity = 0.9

    blur {
        enabled = true
        size = 3
        passes = 3
        vibrancy = 0.1696
    }
}

animations {
    enabled = true
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

# Layouts

dwindle {
    preserve_split = true
}

master {
    new_status = master
}

## Input

input {
    kb_layout = us,ru
    kb_variant =
    kb_model =
    kb_options = grp:win_space_toggle
    kb_rules =
    follow_mouse = 1
    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
    touchpad {
        natural_scroll = true
    }
}

gestures {
   # workspace_swipe = true
}

device {
    name = epic-mouse-v1
    sensitivity = -0.5
}

## Keybindings

$mainMod = SUPER # Sets "Windows" key as main modifier

bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod, Q, killactive,
bind = $mainMod SHIFT, S, exec, hyprshot -m region --clipboard-only
bind = $mainMod, W, exec, firefox
bind = $mainMod, E, exec, $fileManager
bind = $mainMod SHIFT, Space, togglefloating,
bind = $mainMod, R, exec, $menu
bind = $mainMod, P, exec, $powerMenu
bind = $mainMod, F, fullscreen
bind = $mainMod, S, exec, swaync-client -t -sw
bind = $mainMod, L, exec, hyprlock
bind = $mainMod SHIFT, L, exec, loginctl terminate-user $USER
bind = $mainMod SHIFT, C, exec, hyprpicker -a
bind = $mainMod SHIFT, Q, exec, pgrep waybar && pkill waybar || waybar &
bind = $mainMod SHIFT, W, exec, /home/user/.config/scripts/wallpaperswitch/wallpaper-switcher
bind = $mainMod, G, exec, github-desktop
bind = $mainMod SHIFT, R, exec, /home/user/.config/scripts/recorder/wf-recorder
bind = $mainMod ALT, C, exec, swaync-client -C

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10


# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, pamixer -i 5
bindel = ,XF86AudioLowerVolume, exec, pamixer -d 5
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 10%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 10%-
bindel = ,XF86KbdBrightnessUp, exec, asusctl leds next 
bindel = ,XF86KbdBrightnessDown, exec, asusctl leds prev

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

